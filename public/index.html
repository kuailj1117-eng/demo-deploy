<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev工具箱 - 在线开发工具集合</title>
  <meta name="description" content="免费在线开发工具：Base64编码、JSON格式化、时间戳转换、MD5加密、UUID生成、正则测试等22个实用工具">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: linear-gradient(135deg, #f0f2f5 0%, #e8eaed 100%);
      min-height: 100vh;
      color: #333;
    }

    /* ===== 顶栏 ===== */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 24px 20px 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(102,126,234,0.3);
    }
    .header h1 { font-size: 28px; margin-bottom: 4px; letter-spacing: 1px; }
    .header .slogan { font-size: 14px; opacity: 0.85; margin-bottom: 16px; }

    .search-box {
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .search-box .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }

    /* ===== 分类标签 ===== */
    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 16px 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .cat-tag {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      user-select: none;
    }
    .cat-tag:hover { border-color: #667eea; color: #667eea; }
    .cat-tag.active { background: #667eea; color: #fff; border-color: #667eea; }

    /* ===== 工具网格 ===== */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
    .tool-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1.5px solid transparent;
    }
    .tool-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(102,126,234,0.18);
      border-color: #667eea;
    }
    .tool-card .icon { font-size: 32px; margin-bottom: 8px; }
    .tool-card .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .tool-card .desc { font-size: 12px; color: #888; line-height: 1.4; }

    /* ===== 模态弹窗 ===== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .overlay.show { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
    }
    .modal-header .title { font-size: 18px; font-weight: 600; }
    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: #f3f4f6;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: #e5e7eb; }
    .modal-body {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-body label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }
    .modal-body textarea,
    .modal-body input[type="text"],
    .modal-body input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      font-family: "Consolas", "Courier New", "Noto Sans SC", monospace;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-body textarea:focus,
    .modal-body input:focus { border-color: #667eea; }
    .modal-body textarea { min-height: 100px; }
    .output-area {
      background: #f8f9fb;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 14px;
      min-height: 80px;
      font-size: 14px;
      font-family: "Consolas", "Courier New", "Noto Sans SC", monospace;
      white-space: pre-wrap;
      word-break: break-all;
      color: #333;
      max-height: 200px;
      overflow-y: auto;
    }
    .output-area.error { color: #dc2626; }
    .output-area.success { color: #16a34a; }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #333; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-warning { background: #ea580c; color: #fff; }
    .btn-small { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

    .copy-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .copy-toast.show { opacity: 1; }

    .color-preview {
      width: 100%;
      height: 60px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    .palette { display: flex; gap: 8px; flex-wrap: wrap; }
    .palette-swatch {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 4px;
      font-size: 11px;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      transition: transform 0.15s;
    }
    .palette-swatch:hover { transform: scale(1.08); }

    .status-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .status-table th, .status-table td { padding: 6px 10px; border-bottom: 1px solid #eee; text-align: left; }
    .status-table th { background: #f9fafb; font-weight: 600; }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #999;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 16px;
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .tool-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .tool-card { padding: 14px; }
      .tool-card .icon { font-size: 24px; }
      .modal { max-width: 100%; border-radius: 12px 12px 0 0; }
    }
  </style>
</head>
<body>

  <!-- Toast -->
  <div class="copy-toast" id="toast">✅ 已复制到剪贴板</div>

  <!-- 顶栏 -->
  <div class="header">
    <h1>🔧 Dev工具箱</h1>
    <p class="slogan">22个在线开发工具，打开即用，无需登录</p>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索工具... （如 JSON、时间戳、Base64）">
    </div>
  </div>

  <!-- 分类标签 -->
  <div class="categories" id="categories"></div>

  <!-- 工具网格 -->
  <div class="tool-grid" id="toolGrid"></div>

  <!-- 模态弹窗 -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="title" id="modalTitle"></span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="footer">Dev工具箱 · 所有数据仅在浏览器本地处理 · 安全无忧</div>

<script>
// ==================== 工具定义 ====================
const CATEGORIES = [
  { id: 'all', name: '全部', emoji: '📦' },
  { id: 'encode', name: '编码解码', emoji: '📁' },
  { id: 'json', name: 'JSON 工具', emoji: '📝' },
  { id: 'time', name: '时间工具', emoji: '🕐' },
  { id: 'crypto', name: '加密哈希', emoji: '🔐' },
  { id: 'network', name: '网络工具', emoji: '🌐' },
  { id: 'color', name: '颜色工具', emoji: '🎨' },
  { id: 'convert', name: '单位换算', emoji: '📊' },
  { id: 'text', name: '文本工具', emoji: '🔤' },
];

const TOOLS = [
  // ---- 编码解码 ----
  { id:'base64', cat:'encode', name:'Base64 编码解码', desc:'Base64 编码与解码互转', icon:'🔡',
    render(e) {
      e.innerHTML = `
        <label>输入文本</label>
        <textarea id="inp" placeholder="输入要编码/解码的文本..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('base64','encode')">编码 Encode</button>
          <button class="btn btn-secondary" onclick="toolAction('base64','decode')">解码 Decode</button>
          <button class="btn btn-secondary" onclick="clearAll()">清空</button>
          <button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button>
        </div>
        <label>输出结果</label>
        <div class="output-area" id="out"></div>`; },
    encode() { try { setOut(btoa(unescape(encodeURIComponent(getInp())))) } catch(e) { setOut(e.message,'error') } },
    decode() { try { setOut(decodeURIComponent(escape(atob(getInp().replace(/\s/g,''))))); } catch(e) { setOut('解码失败：输入不是有效的 Base64','error') } }
  },

  { id:'urlcode', cat:'encode', name:'URL 编码解码', desc:'encodeURIComponent / decodeURIComponent', icon:'🔗',
    render(e) {
      e.innerHTML = `
        <label>输入文本</label>
        <textarea id="inp" placeholder="输入要编码/解码的 URL 或文本..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('urlcode','encode')">编码 Encode</button>
          <button class="btn btn-secondary" onclick="toolAction('urlcode','decode')">解码 Decode</button>
          <button class="btn btn-secondary" onclick="clearAll()">清空</button>
          <button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button>
        </div>
        <label>输出结果</label>
        <div class="output-area" id="out"></div>`; },
    encode() { setOut(encodeURIComponent(getInp())) },
    decode() { try { setOut(decodeURIComponent(getInp())) } catch(e) { setOut('解码失败：输入不是有效的 URL 编码','error') } }
  },

  { id:'unicode', cat:'encode', name:'Unicode 转换', desc:'字符 ↔ \\uXXXX 互转', icon:'🔤',
    render(e) {
      e.innerHTML = `
        <label>输入</label>
        <textarea id="inp" placeholder="输入字符或 \\uXXXX 编码..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('unicode','toUnicode')">字符 → Unicode</button>
          <button class="btn btn-secondary" onclick="toolAction('unicode','fromUnicode')">Unicode → 字符</button>
          <button class="btn btn-secondary" onclick="clearAll()">清空</button>
          <button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button>
        </div>
        <label>输出结果</label>
        <div class="output-area" id="out"></div>`; },
    toUnicode() { setOut(getInp().split('').map(c=>'\\u'+c.charCodeAt(0).toString(16).padStart(4,'0')).join('')) },
    fromUnicode() { setOut(getInp().replace(/\\u([0-9a-fA-F]{4})/g,(m,p)=>String.fromCharCode(parseInt(p,16)))) }
  },

  // ---- JSON 工具 ----
  { id:'jsonfmt', cat:'json', name:'JSON 格式化', desc:'缩进美化 JSON，语法高亮', icon:'✨',
    render(e) {
      e.innerHTML = `
        <label>输入 JSON 字符串</label>
        <textarea id="inp" placeholder='{"name":"张三","age":25}'></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('jsonfmt','fmt')">格式化</button>
          <button class="btn btn-secondary" onclick="toolAction('jsonfmt','min')">压缩</button>
          <button class="btn btn-secondary" onclick="clearAll()">清空</button>
          <button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button>
        </div>
        <label>输出结果</label>
        <div class="output-area" id="out"></div>`; },
    fmt() { try { setOut(JSON.stringify(JSON.parse(getInp()),null,2)) } catch(e) { setOut('JSON 格式错误：'+e.message,'error') } },
    min() { try { setOut(JSON.stringify(JSON.parse(getInp()))) } catch(e) { setOut('JSON 格式错误：'+e.message,'error') } }
  },

  { id:'jsonval', cat:'json', name:'JSON 校验', desc:'检测 JSON 是否合法，定位错误', icon:'✅',
    render(e) {
      e.innerHTML = `
        <label>输入 JSON 字符串</label>
        <textarea id="inp" placeholder="粘贴 JSON 进行校验..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('jsonval','check')">校验</button>
          <button class="btn btn-secondary" onclick="clearAll()">清空</button>
        </div>
        <div class="output-area" id="out"></div>`; },
    check() {
      const s = getInp().trim();
      if (!s) return setOut('请输入 JSON 字符串','error');
      try { const o=JSON.parse(s); setOut('✅ JSON 合法！\n\n类型：'+ (Array.isArray(o)?'数组':'对象') + '\n键数量：' + (typeof o==='object'&&o!==null?Object.keys(o).length:'-') + '\n大小：'+ s.length +' 字符','success') }
      catch(e) {
        const m=e.message; let pos=m.match(/position\s+(\d+)/);
        if(pos){ const p=parseInt(pos[1]); setOut('❌ JSON 不合法\n\n错误：'+m+'\n错误位置附近：\n...'+s.substring(Math.max(0,p-20),p)+'【← 这里】'+s.substring(p,p+20)+'...','error') }
        else setOut('❌ JSON 不合法\n\n'+m,'error');
      }
    }
  },

  // ---- 时间工具 ----
  { id:'timestamp', cat:'time', name:'时间戳转换', desc:'Unix 时间戳 ↔ 日期时间', icon:'⏱️',
    render(e) {
      e.innerHTML = `
        <label>输入时间戳（秒/毫秒）或日期时间</label>
        <input type="text" id="inp" placeholder="1700000000 或 2024-01-01 00:00:00">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('timestamp','ts2date')">时间戳 → 日期</button>
          <button class="btn btn-secondary" onclick="toolAction('timestamp','date2ts')">日期 → 时间戳</button>
          <button class="btn btn-secondary" onclick="toolAction('timestamp','now')">填入当前时间戳</button>
          <button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button>
        </div>
        <div class="output-area" id="out"></div>`; },
    ts2date() {
      let ts = parseInt(getInp());
      if (isNaN(ts)) return setOut('请输入有效的时间戳','error');
      if (ts > 9999999999999) ts = Math.floor(ts/1000); // 毫秒→秒
      else if (ts < 100000000000) ts = ts * 1000; // 假设是秒
      const d = new Date(ts * 1000);
      setOut('时间戳：' + ts + '（秒）\n' +
        '本地时间：' + d.toLocaleString('zh-CN') + '\n' +
        'UTC 时间：' + d.toISOString() + '\n' +
        '星期：' + ['日','一','二','三','四','五','六'][d.getDay()] + '\n' +
        '毫秒时间戳：' + ts * 1000);
    },
    date2ts() {
      const d = new Date(getInp());
      if (isNaN(d.getTime())) return setOut('日期格式无效，请用格式：2024-01-01 或 2024-01-01 00:00:00','error');
      setOut('秒时间戳：' + Math.floor(d.getTime()/1000) + '\n毫秒时间戳：' + d.getTime() + '\nISO：' + d.toISOString());
    },
    now() { document.getElementById('inp').value = Math.floor(Date.now()/1000).toString(); }
  },

  { id:'datediff', cat:'time', name:'日期计算器', desc:'计算日期差 / N 天后日期', icon:'📅',
    render(e) {
      e.innerHTML = `
        <label>日期一</label><input type="date" id="date1">
        <label>日期二 / 天数</label><input type="text" id="date2" placeholder="2024-12-25 或 +30 或 -7">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('datediff','diff')">计算相差天数</button>
          <button class="btn btn-secondary" onclick="toolAction('datediff','add')">日期 ± 天数</button>
          <button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button>
        </div>
        <div class="output-area" id="out"></div>`; },
    diff() {
      const d1=new Date(document.getElementById('date1').value), d2=new Date(document.getElementById('date2').value);
      if(isNaN(d1)||isNaN(d2)) return setOut('请填写两个有效日期','error');
      const diff=Math.abs(d2-d1), days=Math.floor(diff/86400000);
      setOut('日期一：'+d1.toLocaleDateString('zh-CN')+'\n日期二：'+d2.toLocaleDateString('zh-CN')+'\n相差：'+days+' 天\n共计：'+diff+' 毫秒');
    },
    add() {
      const d1=new Date(document.getElementById('date1').value);
      if(isNaN(d1)) return setOut('请填写有效日期','error');
      const days=parseInt(document.getElementById('date2').value);
      if(isNaN(days)) return setOut('天数请填数字（如 +30 或 -7）','error');
      const d2=new Date(d1.getTime()+days*86400000);
      setOut('基准日期：'+d1.toLocaleDateString('zh-CN')+'\n偏移天数：'+(days>0?'+'+days:days)+'\n结果日期：'+d2.toLocaleDateString('zh-CN')+'\n星期：'+['日','一','二','三','四','五','六'][d2.getDay()]);
    }
  },

  { id:'nowtime', cat:'time', name:'当前时间', desc:'实时 UTC / 本地时间 / 时区', icon:'🕒',
    render(e) {
      e.innerHTML = `<div class="output-area" id="out"></div>`;
      this._timer = setInterval(() => {
        const n=new Date();
        document.getElementById('out').innerHTML =
          '🕐 本地时间：' + n.toLocaleString('zh-CN') + '\n' +
          '🌍 UTC 时间：' + n.toUTCString() + '\n' +
          '📐 时区偏移：UTC' + (n.getTimezoneOffset()<=0?'+':'') + (-n.getTimezoneOffset()/60).toFixed(1) + '\n' +
          '📏 Unix 秒：' + Math.floor(n.getTime()/1000) + '\n' +
          '📏 Unix 毫秒：' + n.getTime() + '\n' +
          '📅 第' + Math.ceil((n-new Date(n.getFullYear(),0,0))/86400000) + '天 / 周' + ['日','一','二','三','四','五','六'][n.getDay()];
      }, 200);
    },
    destroy() { if(this._timer) clearInterval(this._timer) }
  },

  // ---- 加密哈希 ----
  { id:'md5', cat:'crypto', name:'MD5 哈希', desc:'计算文本 MD5 值', icon:'🔑',
    render(e) {
      e.innerHTML = `
        <label>输入文本</label>
        <textarea id="inp" placeholder="输入要计算 MD5 的文本..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('md5','hash')">计算 MD5</button>
          <button class="btn btn-secondary" onclick="clearAll()">清空</button>
          <button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button>
        </div>
        <div class="output-area" id="out"></div>`; },
    async hash() { setOut(await hashText(getInp(), 'MD5')) }
  },

  { id:'sha256', cat:'crypto', name:'SHA256 哈希', desc:'计算文本 SHA-256 值', icon:'🔒',
    render(e) {
      e.innerHTML = `
        <label>输入文本</label>
        <textarea id="inp" placeholder="输入要计算 SHA-256 的文本..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('sha256','hash')">计算 SHA256</button>
          <button class="btn btn-secondary" onclick="clearAll()">清空</button>
          <button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button>
        </div>

  { id:'caseconv', cat:'text', name:'大小写转换', desc:'大写/小写/首字母/驼峰/下划线', icon:'🔠',
    render(e) {
      e.innerHTML = `
        <label>输入文本</label>
        <textarea id="inp" placeholder="输入要转换的文本..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toolAction('caseconv','upper')">全大写</button>

  { id:'regextest', cat:'text', name:'正则测试', desc:'在线正则表达式测试+匹配高亮', icon:'🔍',
    render(e) {
      e.innerHTML = `
        <label>正则表达式（不带前后的 /）</label>
        <input type="text" id="regex" placeholder="例如：\\d{4}-\\d{2}-\\d{2}">

        else setOut('✅ 匹配 ' + matches.length + ' 处：\n' + matches.map((m,i)=>'  ['+(i+1)+'] '+m).join('\n'));

// ==================== 全局状态 ====================
let activeCat = 'all';
let currentTool = null;
let activeTimer = null;

// ==================== 初始化 ====================
function init() {
  renderCategories();
  renderTools();
  document.getElementById('searchInput').addEventListener('input', renderTools);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
  document.addEventListener('keydown', function(e) {
    if(e.ctrlKey && e.key==='Enter' && currentTool) { e.preventDefault();
      const btn=document.querySelector('#modalBody .btn-primary');
      if(btn) btn.click();
    }
    if(e.key==='Escape') closeModal();
  });
  // 委托复制按钮
  document.addEventListener('click', function(e) {
    if(e.target.classList.contains('btn-copy')) {
      const from=e.target.dataset.from;
      const el=document.getElementById(from);
      if(el) { copyText(el.textContent); }
    }
  });
}
function renderCategories() {
  const el=document.getElementById('categories');
  el.innerHTML = CATEGORIES.map(c =>
    `<span class="cat-tag${c.id===activeCat?' active':''}" data-cat="${c.id}">${c.emoji} ${c.name}</span>`
  ).join('');
  el.querySelectorAll('.cat-tag').forEach(tag => {
    tag.addEventListener('click', function() {
      activeCat = this.dataset.cat;
      renderCategories();
      renderTools();
    });
  });
}
function renderTools() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = TOOLS.filter(t => {
    if (activeCat !== 'all' && t.cat !== activeCat) return false;
    if (q && !t.name.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q) && !t.cat.toLowerCase().includes(q)) return false;
    return true;
  });
  const grid = document.getElementById('toolGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">😕 没有匹配的工具，换个关键词试试</div>';
  } else {
    grid.innerHTML = filtered.map(t =>
      `<div class="tool-card" data-tool="${t.id}">
        <div class="icon">${t.icon}</div>
        <div class="name">${t.name}</div>
        <div class="desc">${t.desc}</div>
      </div>`
    ).join('');
    grid.querySelectorAll('.tool-card').forEach(card => {
      card.addEventListener('click', function() { openTool(this.dataset.tool); });
    });
  }
}

// ==================== 模态弹窗 ====================
function openTool(toolId) {
  const tool = TOOLS.find(t => t.id === toolId);
  if (!tool) return;
  if (currentTool && currentTool.destroy) currentTool.destroy();
  currentTool = tool;
  document.getElementById('modalTitle').textContent = tool.icon + ' ' + tool.name;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  tool.render(body);
  document.getElementById('overlay').classList.add('show');
}
function closeModal() {
  if (currentTool && currentTool.destroy) currentTool.destroy();
  currentTool = null;
  document.getElementById('overlay').classList.remove('show');
}

// ==================== 工具调用 ====================
function toolAction(toolId, action) {
  const tool = TOOLS.find(t => t.id === toolId);
  if (tool && tool[action]) tool[action]();
}

// ==================== 辅助函数 ====================
function getInp() {
  const el = document.getElementById('inp');
  return el ? el.value : '';
}
function setOut(text, cls) {
  const el = document.getElementById('out');
  if (el) { el.textContent = text; el.className = 'output-area'; if (cls) el.classList.add(cls); }
}
function clearAll() {
  const inp = document.getElementById('inp'), out = document.getElementById('out');
  if (inp) inp.value = '';
  if (out) { out.textContent = ''; out.className = 'output-area'; }
}
async function hashText(text, algo) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest(algo, enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function copyText(text) {
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }).catch(() => {});
}

// ==================== 启动 ====================
init();
</script>
