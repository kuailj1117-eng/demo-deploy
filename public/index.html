<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev工具箱 - 在线开发工具集合</title>
  <meta name="description" content="免费在线开发工具：Base64编码、JSON格式化、时间戳转换、MD5加密、UUID生成、正则测试、二维码生成等26个实用工具">
  <style>
    /* ===== CSS 变量（亮色/暗色） ===== */
    :root {
      --bg: #f0f2f5; --bg2: #e8eaed; --card: #fff; --cardHover: #fff;
      --text: #333; --text2: #555; --text3: #888;
      --border: #e5e7eb; --border2: #d1d5db;
      --shadow: 0 2px 8px rgba(0,0,0,0.06); --shadowHover: 0 8px 24px rgba(102,126,234,0.18);
      --headerBg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --modalBg: #fff; --outputBg: #f8f9fb;
      --btnSecBg: #e5e7eb; --btnSecText: #333;
      --tagBg: #fff;
    }
    body.dark {
      --bg: #1a1a2e; --bg2: #16213e; --card: #222244; --cardHover: #2a2a50;
      --text: #e0e0e0; --text2: #bbb; --text3: #999;
      --border: #333; --border2: #444;
      --shadow: 0 2px 8px rgba(0,0,0,0.3); --shadowHover: 0 8px 24px rgba(102,126,234,0.3);
      --headerBg: linear-gradient(135deg, #4a3f8a 0%, #5a3580 100%);
      --modalBg: #222244; --outputBg: #1a1a35;
      --btnSecBg: #333; --btnSecText: #ccc;
      --tagBg: #222244;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
      min-height: 100vh; color: var(--text); transition: background 0.3s, color 0.3s;
    }

    /* ===== 顶栏 ===== */
    .header {
      background: var(--headerBg); color: #fff; padding: 24px 20px 20px;
      text-align: center; box-shadow: 0 4px 20px rgba(102,126,234,0.3);
      position: relative;
    }
    .header h1 { font-size: 28px; margin-bottom: 4px; letter-spacing: 1px; }
    .header .slogan { font-size: 14px; opacity: 0.85; margin-bottom: 16px; }
    .header-actions { position: absolute; top: 16px; right: 20px; display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.2); color: #fff; transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.35); }
    .mode-badge {
      font-size: 12px; padding: 4px 10px; border-radius: 12px;
      background: rgba(255,255,255,0.2); color: #fff; font-weight: 500;
    }

    .search-box { max-width: 480px; margin: 0 auto; position: relative; }
    .search-box input {
      width: 100%; padding: 10px 16px 10px 40px; border: none; border-radius: 24px;
      font-size: 15px; outline: none; box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      background: #fff; color: #333;
    }
    .search-box .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none; }
    .search-hint { font-size: 11px; opacity: 0.7; margin-top: 6px; }

    /* ===== 分类标签 ===== */
    .categories {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      padding: 16px 20px 8px; max-width: 1000px; margin: 0 auto;
    }
    .cat-tag {
      padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border2);
      background: var(--tagBg); cursor: pointer; font-size: 13px; font-weight: 500;
      transition: all 0.2s; user-select: none; color: var(--text);
    }
    .cat-tag:hover { border-color: #667eea; color: #667eea; }
    .cat-tag.active { background: #667eea; color: #fff; border-color: #667eea; }
    .cat-tag .badge { background: rgba(0,0,0,0.12); padding: 1px 7px; border-radius: 10px; font-size: 11px; margin-left: 4px; }
    .cat-tag.active .badge { background: rgba(255,255,255,0.25); }

    /* 收藏/最近区域 */
    .section-label {
      max-width: 1100px; margin: 16px auto 4px; padding: 0 20px;
      font-size: 13px; font-weight: 600; color: var(--text2); display: none;
    }
    .section-label.show { display: block; }

    /* ===== 工具网格 ===== */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px; max-width: 1100px; margin: 0 auto; padding: 0 20px 20px;
    }
    .tool-card {
      background: var(--card); border-radius: 12px; padding: 20px; cursor: pointer;
      transition: all 0.25s; box-shadow: var(--shadow); border: 1.5px solid transparent;
      position: relative;
    }
    .tool-card:hover { transform: translateY(-3px); box-shadow: var(--shadowHover); border-color: #667eea; }
    .tool-card .icon { font-size: 32px; margin-bottom: 8px; }
    .tool-card .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
    .tool-card .desc { font-size: 12px; color: var(--text3); line-height: 1.4; }
    .star-btn {
      position: absolute; top: 10px; right: 12px; background: none; border: none;
      font-size: 18px; cursor: pointer; opacity: 0.3; transition: all 0.2s;
    }
    .tool-card:hover .star-btn { opacity: 1; }
    .star-btn.faved { opacity: 1; color: #f59e0b; }
    .star-btn:hover { transform: scale(1.3); }

    /* ===== 模态弹窗 ===== */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 999; justify-content: center; align-items: center; padding: 20px;
    }
    .overlay.show { display: flex; }
    .modal {
      background: var(--modalBg); border-radius: 16px; width: 100%; max-width: 700px;
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .modal-header .title { font-size: 18px; font-weight: 600; color: var(--text); }
    .modal-header .nav-btns { display: flex; gap: 6px; }
    .modal-nav {
      width: 32px; height: 32px; border: none; background: var(--btnSecBg); color: var(--btnSecText);
      border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .modal-close {
      width: 32px; height: 32px; border: none; background: var(--btnSecBg); color: var(--btnSecText);
      border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
    }
    .modal-nav:hover, .modal-close:hover { background: #667eea; color: #fff; }
    .modal-body {
      flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
    }
    .modal-body label { font-size: 13px; font-weight: 600; color: var(--text2); }
    .modal-body textarea, .modal-body input[type="text"], .modal-body input[type="number"], .modal-body input[type="date"] {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border2); border-radius: 10px;
      font-size: 14px; font-family: "Consolas","Courier New","Noto Sans SC",monospace;
      resize: vertical; outline: none; background: var(--card); color: var(--text);
      transition: border-color 0.2s;
    }
    .modal-body textarea:focus, .modal-body input:focus { border-color: #667eea; }
    .modal-body textarea { min-height: 100px; }
    .output-area {
      background: var(--outputBg); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; min-height: 80px; font-size: 14px;
      font-family: "Consolas","Courier New","Noto Sans SC",monospace;
      white-space: pre-wrap; word-break: break-all; color: var(--text);
      max-height: 250px; overflow-y: auto;
    }
    .output-area.error { color: #dc2626; } .output-area.success { color: #16a34a; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      padding: 8px 18px; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-secondary { background: var(--btnSecBg); color: var(--btnSecText); }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-small { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

    .copy-toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 24px; border-radius: 8px;
      font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    body.dark .copy-toast { background: #667eea; }
    .copy-toast.show { opacity: 1; }

    .color-preview { width: 100%; height: 60px; border-radius: 10px; border: 1px solid var(--border2); }
    .palette { display: flex; gap: 8px; flex-wrap: wrap; }
    .palette-swatch {
      width: 70px; height: 70px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px;
      font-size: 11px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); transition: transform 0.15s;
    }
    .palette-swatch:hover { transform: scale(1.08); }

    .status-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .status-table th, .status-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .status-table th { background: var(--outputBg); font-weight: 600; color: var(--text); }

    .drop-zone {
      border: 2px dashed var(--border2); border-radius: 12px; padding: 40px; text-align: center;
      color: var(--text3); cursor: pointer; transition: all 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #667eea; background: rgba(102,126,234,0.05); }

    .md-preview { background: var(--outputBg); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px; min-height: 80px; max-height: 300px; overflow-y: auto; }
    .md-preview h1,.md-preview h2,.md-preview h3 { margin: 8px 0 4px; }
    .md-preview code { background: rgba(102,126,234,0.1); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .md-preview pre { background: var(--outputBg); padding: 10px; border-radius: 8px; overflow-x: auto; }
    .md-preview pre code { background: none; padding: 0; }
    .md-preview table { border-collapse: collapse; width: 100%; }
    .md-preview th,.md-preview td { border: 1px solid var(--border2); padding: 6px 10px; }

    /* 状态栏 */
    .status-bar {
      text-align: center; padding: 16px 20px 24px; font-size: 12px; color: var(--text3);
      display: flex; justify-content: center; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.online { background: #16a34a; }
    .status-dot.offline { background: #f59e0b; }

    .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text3); font-size: 16px; }

    @media (max-width: 600px) {
      .tool-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .tool-card { padding: 14px; }
      .tool-card .icon { font-size: 24px; }
      .modal { max-width: 100%; border-radius: 12px 12px 0 0; align-self: flex-end; }
      .header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="copy-toast" id="toast">✅ 已复制到剪贴板</div>

  <!-- ===== 顶栏 ===== -->
  <div class="header">
    <div class="header-actions">
      <span class="mode-badge" id="modeBadge">🔍 检测中...</span>
      <button class="icon-btn" id="darkToggle" title="切换深色/亮色模式">🌓</button>
    </div>
    <h1>🔧 Dev工具箱</h1>
    <p class="slogan">26个在线工具，打开即用，无需登录</p>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索工具... （Ctrl+K 快速搜索）">
    </div>
    <div class="search-hint">💡 按 Ctrl+K 聚焦搜索 · ← → 切换工具 · Esc 关闭</div>
  </div>

  <!-- ===== 分类标签 ===== -->
  <div class="categories" id="categories"></div>

  <!-- ===== 收藏区域 ===== -->
  <div class="section-label" id="favLabel">⭐ 我的收藏</div>
  <div class="tool-grid" id="favGrid" style="padding-bottom:4px;"></div>

  <!-- ===== 最近使用区域 ===== -->
  <div class="section-label" id="recentLabel">🕘 最近使用</div>
  <div class="tool-grid" id="recentGrid" style="padding-bottom:4px;"></div>

  <!-- ===== 主工具网格 ===== -->
  <div class="tool-grid" id="toolGrid"></div>

  <!-- ===== 状态栏 ===== -->
  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText"></span></span>
    <span id="toolCount"></span>
    <span>数据仅在浏览器本地处理 · 安全无忧</span>
  </div>

  <!-- ===== 模态弹窗 ===== -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="title" id="modalTitle"></span>
        <div class="nav-btns">
          <button class="modal-nav" id="modalPrev" title="上一个工具 ←">←</button>
          <button class="modal-nav" id="modalNext" title="下一个工具 →">→</button>
          <button class="modal-close" id="modalClose">✕</button>
        </div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

<script>
// ==================== 状态管理 ====================
let activeCat = 'all', currentTool = null, currentToolId = null;
let backendOnline = false;
const FAV_KEY = 'devtools_favs', RECENT_KEY = 'devtools_recent', DARK_KEY = 'devtools_dark';
const VERCEL_API = ''; // 同源为空，GitHub Pages 上设为 'https://demo-deploy-ashy.vercel.app'

function getFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; } }
function saveFavs(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }
function getRecents() { try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; } catch(e) { return []; } }
function saveRecents(arr) { localStorage.setItem(RECENT_KEY, JSON.stringify(arr)); }
function isDark() { return localStorage.getItem(DARK_KEY) === '1'; }
function setDark(v) { localStorage.setItem(DARK_KEY, v?'1':'0'); }

function addRecent(id) {
  let arr = getRecents().filter(x => x !== id);
  arr.unshift(id); if (arr.length > 6) arr = arr.slice(0,6);
  saveRecents(arr);
}

// ==================== 后端检测 ====================
async function detectBackend() {
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 2000);
    const r = await fetch(VERCEL_API + '/api/ping', { signal: ctrl.signal });
    const d = await r.json();
    backendOnline = d && d.status === 'ok';
  } catch(e) { backendOnline = false; }
  updateStatusBar();
}
function updateStatusBar() {
  const badge = document.getElementById('modeBadge');
  const dot = document.getElementById('statusDot');
  const st = document.getElementById('statusText');
  if (backendOnline) {
    badge.textContent = '🌍 全域模式'; dot.className = 'status-dot online'; st.textContent = '后端已连接 · API 增强可用';
  } else {
    badge.textContent = '🇨🇳 国内模式'; dot.className = 'status-dot offline'; st.textContent = '纯前端模式 · 全部工具可用';
  }
  document.getElementById('toolCount').textContent = '共 ' + TOOLS.length + ' 个工具';
}

// ==================== 深色模式 ====================
function applyDark() {
  if (isDark()) document.body.classList.add('dark');
  else document.body.classList.remove('dark');
}
function toggleDark() {
  setDark(!isDark()); applyDark();
}
document.getElementById('darkToggle').addEventListener('click', toggleDark);
applyDark();

// ==================== 工具定义 ====================
const CATEGORIES = [
  { id: 'all', name: '全部', emoji: '📦' },
  { id: 'favorites', name: '收藏', emoji: '⭐' },
  { id: 'recent', name: '最近', emoji: '🕘' },
  { id: 'encode', name: '编码解码', emoji: '📁' },
  { id: 'json', name: 'JSON 工具', emoji: '📝' },
  { id: 'time', name: '时间工具', emoji: '🕐' },
  { id: 'crypto', name: '加密哈希', emoji: '🔐' },
  { id: 'network', name: '网络工具', emoji: '🌐' },
  { id: 'color', name: '颜色工具', emoji: '🎨' },
  { id: 'convert', name: '单位换算', emoji: '📊' },
  { id: 'text', name: '文本工具', emoji: '🔤' },
];

const TOOLS = [
  // ---- 编码解码 ----
  { id:'base64', cat:'encode', name:'Base64 编码解码', desc:'Base64 编码与解码互转', icon:'🔡',
    render(e) { e.innerHTML = `<label>输入文本</label><textarea id="inp" placeholder="输入要编码/解码的文本..."></textarea>
      <div class="btn-row"><button class="btn btn-primary" data-act="encode">编码 Encode</button><button class="btn btn-secondary" data-act="decode">解码 Decode</button><button class="btn btn-secondary" data-act="clear">清空</button><button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button></div>
      <label>输出结果</label><div class="output-area" id="out"></div>`; },
    encode() { try { setOut(btoa(unescape(encodeURIComponent(getInp())))) } catch(e) { setOut(e.message,'error') } },
    decode() { try { setOut(decodeURIComponent(escape(atob(getInp().replace(/\s/g,''))))); } catch(e) { setOut('解码失败：输入不是有效的 Base64','error') } }
  },
  { id:'urlcode', cat:'encode', name:'URL 编码解码', desc:'encodeURIComponent / decodeURIComponent', icon:'🔗',
    render(e) { e.innerHTML = `<label>输入文本</label><textarea id="inp" placeholder="输入要编码/解码的 URL 或文本..."></textarea>
      <div class="btn-row"><button class="btn btn-primary" data-act="encode">编码 Encode</button><button class="btn btn-secondary" data-act="decode">解码 Decode</button><button class="btn btn-secondary" data-act="clear">清空</button><button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button></div>
      <label>输出结果</label><div class="output-area" id="out"></div>`; },
    encode() { setOut(encodeURIComponent(getInp())) },
    decode() { try { setOut(decodeURIComponent(getInp())) } catch(e) { setOut('解码失败','error') } }
  },
  { id:'unicode', cat:'encode', name:'Unicode 转换', desc:'字符 ↔ \\uXXXX 互转', icon:'🔤',
    render(e) { e.innerHTML = `<label>输入</label><textarea id="inp" placeholder="输入字符或 \\uXXXX 编码..."></textarea>
      <div class="btn-row"><button class="btn btn-primary" data-act="toUnicode">字符 → Unicode</button><button class="btn btn-secondary" data-act="fromUnicode">Unicode → 字符</button><button class="btn btn-secondary" data-act="clear">清空</button><button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button></div>
      <label>输出结果</label><div class="output-area" id="out"></div>`; },
    toUnicode() { setOut(getInp().split('').map(c=>'\\u'+c.charCodeAt(0).toString(16).padStart(4,'0')).join('')) },
    fromUnicode() { setOut(getInp().replace(/\\u([0-9a-fA-F]{4})/g,(m,p)=>String.fromCharCode(parseInt(p,16)))) }
  },

  // ---- JSON 工具 ----
  { id:'jsonfmt', cat:'json', name:'JSON 格式化', desc:'缩进美化 + 压缩', icon:'✨',
    render(e) { e.innerHTML = `<label>输入 JSON 字符串</label><textarea id="inp" placeholder='{"name":"张三","age":25}'></textarea>
      <div class="btn-row"><button class="btn btn-primary" data-act="fmt">格式化</button><button class="btn btn-secondary" data-act="min">压缩</button><button class="btn btn-secondary" data-act="clear">清空</button><button class="btn btn-success btn-copy" data-from="out">📋 复制结果</button></div>
      <label>输出结果</label><div class="output-area" id="out"></div>`; },
    fmt() { try { setOut(JSON.stringify(JSON.parse(getInp()),null,2)) } catch(e) { setOut('JSON 格式错误：'+e.message,'error') } },
    min() { try { setOut(JSON.stringify(JSON.parse(getInp()))) } catch(e) { setOut('JSON 格式错误：'+e.message,'error') } }
  },
  { id:'jsonval', cat:'json', name:'JSON 校验', desc:'检测合法性，定位错误', icon:'✅',
    render(e) { e.innerHTML = `<label>输入 JSON 字符串</label><textarea id="inp" placeholder="粘贴 JSON 进行校验..."></textarea>
      <div class="btn-row"><button class="btn btn-primary" data-act="check">校验</button><button class="btn btn-secondary" data-act="clear">清空</button></div>
      <div class="output-area" id="out"></div>`; },
    check() { const s=getInp().trim(); if(!s) return setOut('请输入 JSON 字符串','error');
      try { const o=JSON.parse(s); setOut('✅ JSON 合法！\n\n类型：'+ (Array.isArray(o)?'数组':'对象') + '\n键数量：' + (typeof o==='object'&&o!==null?Object.keys(o).length:'-') + '\n大小：'+ s.length +' 字符','success'); }

      <div class="output-area" id="out"></div>`; },
    dedup() { const lines=getInp().split('\n').filter(l=>l.trim()); const uniq=[...new Set(lines)]; setOut(uniq.join('\n')+'\n\n--- 去重前 '+lines.length+' 行 → 去重后 '+uniq.length+' 行 ---'); },
    sortAsc() { const lines=getInp().split('\n').filter(l=>l.trim()).sort(); setOut(lines.join('\n')); },
    sortDesc() { const lines=getInp().split('\n').filter(l=>l.trim()).sort().reverse(); setOut(lines.join('\n')); }
  },
  { id:'qrcode', cat:'encode', name:'二维码生成', desc:'文本 → 二维码图片', icon:'🔢',
    render(e) { e.innerHTML = `<label>输入文本或网址</label><input type="text" id="inp" placeholder="https://github.com 或 任意文本">
      <label>尺寸</label><input type="number" id="size" value="200" min="50" max="500">
      <div class="btn-row"><button class="btn btn-primary" data-act="gen">生成二维码</button><button class="btn btn-secondary" data-act="clear">清空</button></div>
      <div id="qrBox" style="text-align:center;"></div>`; },
    gen() { const text=encodeURIComponent(getInp()); const size=document.getElementById('size').value||200; if(!getInp()) return; document.getElementById('qrBox').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+text+'" style="max-width:100%;border-radius:8px;" onerror="this.parentElement.innerHTML=\'<p style=color:#dc2626>生成失败，请检查网络</p>\'">'; }
  },
];

// ==================== 初始化 ====================
function init() {
  renderCategories();
  renderAllTools();
  document.getElementById('searchInput').addEventListener('input', renderAllTools);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalPrev').addEventListener('click', () => navTool(-1));
  document.getElementById('modalNext').addEventListener('click', () => navTool(1));
  document.getElementById('overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
  document.addEventListener('keydown', handleKey);
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('btn-copy')) {
      const el = document.getElementById(e.target.dataset.from);
      if (el) copyText(el.textContent);
    }
    // 按钮数据属性委托
    const btn = e.target.closest('[data-act]');
    if (btn && currentTool && currentTool[btn.dataset.act]) {
      currentTool[btn.dataset.act]();
    }
  });
  // URL hash 路由
  if (location.hash) {
    const id = location.hash.replace('#','');
    setTimeout(() => { if (TOOLS.find(t=>t.id===id)) openTool(id); }, 300);
  }
  window.addEventListener('hashchange', () => {
    const id = location.hash.replace('#','');
    if (id && TOOLS.find(t=>t.id===id)) openTool(id);
  });
  // 检测后端
  detectBackend();
  // 实时更新工具（字数统计 / Markdown / 正则）
  window._wcLive = function() {
    const s = getInp(); if (!s && s!=='') return;
    const ch = (s.match(/[一-鿿]/g)||[]).length;
    const ew = (s.match(/[a-zA-Z]+/g)||[]).length;
    setOut('总字符：'+s.length+' | 中文：'+ch+' | 英文单词：'+ew+' | 行数：'+(s?s.split('\n').length:0)+' | 字节：'+new Blob([s]).size);
  };
  window._mdLive = function() { document.getElementById('mdPreview').innerHTML = simpleMD(getInp()); };
  window._reLive = function() { if (currentTool && currentTool._run) currentTool._run(); };
}

function renderCategories() {
  const el = document.getElementById('categories');
  const favs = getFavs(), recents = getRecents();
  const counts = {};
  TOOLS.forEach(t => { counts[t.cat] = (counts[t.cat]||0)+1; });
  counts['all'] = TOOLS.length;
  counts['favorites'] = favs.length;
  counts['recent'] = Math.min(recents.length, 6);

  el.innerHTML = CATEGORIES.map(c =>
    `<span class="cat-tag${c.id===activeCat?' active':''}" data-cat="${c.id}">${c.emoji} ${c.name}<span class="badge">${counts[c.id]||0}</span></span>`
  ).join('');
  el.querySelectorAll('.cat-tag').forEach(tag => {
    tag.addEventListener('click', function() {
      activeCat = this.dataset.cat;
      renderCategories();
      renderAllTools();
    });
  });
}

function renderAllTools() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const favs = getFavs(), recents = getRecents();

  // 主网格
  let filtered = TOOLS;
  if (activeCat === 'favorites') filtered = TOOLS.filter(t => favs.includes(t.id));
  else if (activeCat === 'recent') filtered = TOOLS.filter(t => recents.includes(t.id));
  else if (activeCat !== 'all') filtered = TOOLS.filter(t => t.cat === activeCat);
  if (q) filtered = filtered.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));
  renderGrid('toolGrid', filtered, favs);

  // 收藏网格
  const favTools = TOOLS.filter(t => favs.includes(t.id));
  const favGrid = document.getElementById('favGrid');
  const favLabel = document.getElementById('favLabel');
  if (favTools.length > 0 && activeCat === 'all' && !q) {
    renderGrid('favGrid', favTools, favs);
    favGrid.style.display = ''; favLabel.classList.add('show');
  } else {
    favGrid.innerHTML = ''; favGrid.style.display = 'none'; favLabel.classList.remove('show');
  }

  // 最近网格
  const recentTools = recents.map(id => TOOLS.find(t => t.id === id)).filter(Boolean);
  const recentGrid = document.getElementById('recentGrid');
  const recentLabel = document.getElementById('recentLabel');
  if (recentTools.length > 0 && activeCat === 'all' && !q) {
    renderGrid('recentGrid', recentTools, favs);
    recentGrid.style.display = ''; recentLabel.classList.add('show');
  } else {
    recentGrid.innerHTML = ''; recentGrid.style.display = 'none'; recentLabel.classList.remove('show');
  }
}

function renderGrid(gridId, tools, favs) {
  const grid = document.getElementById(gridId);
  if (tools.length === 0) {
    grid.innerHTML = '<div class="empty-state">😕 没有匹配的工具，换个关键词试试</div>';
  } else {
    grid.innerHTML = tools.map(t =>
      `<div class="tool-card" data-tool="${t.id}">
        <button class="star-btn${favs.includes(t.id)?' faved':''}" data-tool="${t.id}" data-fav="1">⭐</button>
        <div class="icon">${t.icon}</div>
        <div class="name">${t.name}</div>
        <div class="desc">${t.desc}</div>
      </div>`
    ).join('');
    grid.querySelectorAll('.tool-card').forEach(card => {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.star-btn')) return;
        openTool(this.dataset.tool);
      });
    });
    grid.querySelectorAll('.star-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleFav(this.dataset.tool);
      });
    });
  }
}

// ==================== 收藏 ====================
function toggleFav(id) {
  let favs = getFavs();
  if (favs.includes(id)) favs = favs.filter(x => x !== id);
  else favs.push(id);
  saveFavs(favs);
  renderAllTools();
  if (activeCat === 'favorites' && favs.length === 0) { activeCat = 'all'; renderCategories(); }
}

// ==================== 模态弹窗 ====================
function openTool(toolId) {
  const tool = TOOLS.find(t => t.id === toolId);
  if (!tool) return;
  if (currentTool && currentTool.destroy) currentTool.destroy();
  currentTool = tool; currentToolId = toolId;
  document.getElementById('modalTitle').textContent = tool.icon + ' ' + tool.name;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  tool.render(body);
  document.getElementById('overlay').classList.add('show');
  addRecent(toolId);
  renderAllTools();
  location.hash = toolId;
  // 实时联动
  setTimeout(() => {
    if (toolId === 'wordcount' && document.getElementById('inp')) document.getElementById('inp').addEventListener('input', window._wcLive);
    if (toolId === 'markdown' && document.getElementById('inp')) document.getElementById('inp').addEventListener('input', window._mdLive);
    if (toolId === 'regextest' && document.getElementById('inp')) document.getElementById('inp').addEventListener('input', window._reLive);
  }, 100);
}

function closeModal() {
  if (currentTool && currentTool.destroy) currentTool.destroy();
  currentTool = null; currentToolId = null;
  document.getElementById('overlay').classList.remove('show');
  location.hash = '';
}

function navTool(dir) {
  const idx = TOOLS.findIndex(t => t.id === currentToolId);
  if (idx < 0) return;
  const next = TOOLS[(idx + dir + TOOLS.length) % TOOLS.length];
  openTool(next.id);
}

// ==================== 键盘快捷键 ====================
function handleKey(e) {
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  if (e.key === 'Escape') { closeModal(); }
  if (currentTool && e.key === 'ArrowLeft') { navTool(-1); }
  if (currentTool && e.key === 'ArrowRight') { navTool(1); }
  if (e.ctrlKey && e.key === 'Enter' && currentTool) {
    e.preventDefault();
    const btn = document.querySelector('#modalBody .btn-primary');
    if (btn) btn.click();
  }
}

// ==================== 辅助函数 ====================
function getInp() { const el = document.getElementById('inp'); return el ? el.value : ''; }
function setOut(text, cls) { const el = document.getElementById('out'); if (el) { el.textContent = text; el.className = 'output-area'; if (cls) el.classList.add(cls); } }
function copyText(text) {
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }).catch(() => {});
}
async function hashText(text, algo) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest(algo, enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function parseRgb(v) { let m=v.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/); if(m) return [parseInt(m[1]),parseInt(m[2]),parseInt(m[3])]; m=v.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/); if(m) return [parseInt(m[1]),parseInt(m[2]),parseInt(m[3])]; return null; }
function parseUA(ua) {
  const l=ua.toLowerCase(); let b='Unknown',bv='',os='Unknown',osv='',eng='Unknown';
  if(l.includes('edg/')){b='Edge';let m=l.match(/edg\/([\d.]+)/);if(m)bv=m[1];}
  else if(l.includes('chrome/')){b='Chrome';let m=l.match(/chrome\/([\d.]+)/);if(m)bv=m[1];}
  else if(l.includes('safari/')&&!l.includes('chrome')){b='Safari';let m=l.match(/version\/([\d.]+)/);if(m)bv=m[1];}
  else if(l.includes('firefox/')){b='Firefox';let m=l.match(/firefox\/([\d.]+)/);if(m)bv=m[1];}
  else if(l.includes('opera/')||l.includes('opr/')){b='Opera';let m=l.match(/(?:opera|opr)\/([\d.]+)/);if(m)bv=m[1];}
  if(l.includes('webkit')) eng='WebKit'; if(l.includes('blink')) eng='Blink'; if(l.includes('gecko')&&!l.includes('webkit')) eng='Gecko';
  if(l.includes('windows nt 10')){os='Windows';osv='10/11';}else if(l.includes('windows nt 6.3')){os='Windows';osv='8.1';}else if(l.includes('windows nt')){os='Windows';let m=l.match(/windows nt ([\d.]+)/);if(m)osv=m[1];}
  else if(l.includes('mac os x')){os='macOS';let m=l.match(/mac os x ([_\d.]+)/);if(m)osv=m[1].replace(/_/g,'.');}
  else if(l.includes('android')){os='Android';let m=l.match(/android ([\d.]+)/);if(m)osv=m[1];}
  else if(l.includes('ios')||l.includes('iphone')||l.includes('ipad')){os='iOS';let m=l.match(/os ([\d_]+)/);if(m)osv=m[1].replace(/_/g,'.');}
  else if(l.includes('linux')) os='Linux';
  let dev='桌面端'; if(l.includes('mobile')||l.includes('android')&&!l.includes('tablet')) dev='手机'; else if(l.includes('ipad')||l.includes('tablet')) dev='平板';
  return `浏览器：${b}${bv?' '+bv:''}\n引擎：${eng}\n系统：${os}${osv?' '+osv:''}\n设备：${dev}\n\n原始 UA：\n${ua}`;
}
// 简易 Markdown 解析
function simpleMD(md) {
  if (!md) return '';
  let h = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 代码块 ```
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // 行内代码
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 标题
  h = h.replace(/^#### (.+)/gm, '<h4>$1</h4>');
  h = h.replace(/^### (.+)/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)/gm, '<h1>$1</h1>');
  // 粗体/斜体
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<b><i>$1</i></b>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  h = h.replace(/\*(.+?)\*/g, '<i>$1</i>');
  // 链接和图片
  h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;">');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // 水平线
  h = h.replace(/^---+/gm, '<hr>');
  // 无序列表
  h = h.replace(/^[\-\*] (.+)/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // 有序列表
  h = h.replace(/^\d+\. (.+)/gm, '<li>$1</li>');
  // 块引用
  h = h.replace(/^> (.+)/gm, '<blockquote style="border-left:3px solid #667eea;padding-left:12px;color:var(--text2);margin:8px 0;">$1</blockquote>');
  // 段落
  h = h.replace(/\n\n/g, '</p><p>');
  h = '<p>' + h + '</p>';
  h = h.replace(/<p>\s*<\/p>/g, '');
  return h;
}

// ==================== 启动 ====================
init();
</script>
